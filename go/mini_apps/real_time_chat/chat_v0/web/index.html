<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Go Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 12px;
        }

        #messages {
            flex: 1;
            /* takes all available vertical space */
            overflow-y: auto;
            /* scroll when messages overflow */
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message {
            padding: 4px 8px;
            border-radius: 3px;
            line-height: 1.4;
        }

        /* system messages like "Alice joined" */
        .message.system {
            color: #608b4e;
            font-style: italic;
        }

        /* regular chat messages */
        .message.chat {
            color: #d4d4d4;
        }

        #input-row {
            display: flex;
            gap: 8px;
        }

        input,
        button {
            font-family: monospace;
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            background: #252526;
            color: #d4d4d4;
            outline: none;
        }

        input {
            flex: 1;
        }

        button {
            cursor: pointer;
            background: #0e639c;
            border-color: #0e639c;
            color: white;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #status {
            font-size: 12px;
            color: #608b4e;
        }

        #status.disconnected {
            color: #f44747;
        }
    </style>
</head>

<body>

    <div id="status" class="disconnected">disconnected</div>
    <div id="messages"></div>

    <div id="input-row">
        <input id="input" type="text" placeholder="type a message..." disabled />
        <button id="send" disabled>send</button>
    </div>

    <script>
        // --- DOM references ---
        const messagesEl = document.getElementById("messages")
        const inputEl = document.getElementById("input")
        const sendBtn = document.getElementById("send")
        const statusEl = document.getElementById("status")

        // --- Get name from user before connecting ---
        // prompt() blocks until the user types something.
        // In a real app this would be a proper login screen.
        const name = prompt("Enter your name:")
        if (!name) {
            // If they cancel or leave it empty, nothing works.
            document.body.innerHTML = "<p style='color:red;padding:20px'>Name is required. Please refresh.</p>"
            throw new Error("no name provided")
        }

        // --- Open the WebSocket connection ---
        // We pass the name as a query parameter — the server reads it in serveWs().
        const ws = new WebSocket(`ws://${location.host}/ws?name=${encodeURIComponent(name)}`)

        // --- WebSocket event handlers ---

        // Fired once the connection is successfully established.
        ws.onopen = () => {
            setStatus(true)
            addMessage(`you joined as "${name}"`, "system")
        }

        // Fired when the server sends a message.
        // event.data is the raw string — could contain multiple messages
        // batched by writePump with \n separator.
        ws.onmessage = (event) => {
            // Split on newline to handle writePump batching.
            // If writePump packed 3 messages into one frame, we get them all.
            const lines = event.data.split("\n")
            lines.forEach(line => {
                if (line.trim()) addMessage(line, "chat")
            })
        }

        // Fired when the connection closes — expected or not.
        ws.onclose = () => {
            setStatus(false)
            addMessage("disconnected from server", "system")
            // Disable input — no point sending if we're disconnected.
            inputEl.disabled = true
            sendBtn.disabled = true
        }

        // Fired on connection error.
        ws.onerror = (err) => {
            addMessage("connection error", "system")
            console.error("websocket error:", err)
        }

        // --- Sending messages ---

        sendBtn.onclick = sendMessage

        // Allow Enter key to send — quality of life.
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage()
        })

        function sendMessage() {
            const text = inputEl.value.trim()

            // Don't send empty messages.
            if (!text) return

            // ws.send() puts the message into the WebSocket send buffer.
            // readPump on the server will pick it up.
            ws.send(text)

            // Clear the input immediately — don't wait for the server echo.
            inputEl.value = ""
            inputEl.focus()
        }

        // --- Helpers ---

        function addMessage(text, type) {
            const div = document.createElement("div")
            div.className = `message ${type}`
            div.textContent = text
            messagesEl.appendChild(div)

            // Auto-scroll to the latest message.
            messagesEl.scrollTop = messagesEl.scrollHeight
        }

        function setStatus(connected) {
            statusEl.textContent = connected ? "connected" : "disconnected"
            statusEl.className = connected ? "" : "disconnected"
            inputEl.disabled = !connected
            sendBtn.disabled = !connected
        }
    </script>
</body>

</html>
