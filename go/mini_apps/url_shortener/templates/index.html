<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 14px;
            width: 520px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 12px 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #6366f1;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #4f46e5;
        }

        .result {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .result a {
            font-size: 20px;
            font-weight: 600;
            color: #4f46e5;
            text-decoration: none;
            word-break: break-all;
        }

        .result a:hover {
            text-decoration: underline;
        }

        #copyBtn {
            display: none;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            background: #10b981;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        #copyBtn:hover {
            background: #059669;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>URL Shortener</h1>

        <form id="urlForm">
            <input type="text" id="urlInput" name="url" placeholder="Paste your long URL here" required>

            <button type="submit">
                Shorten URL
            </button>
        </form>

        <div class="result">
            <a id="result" target="_blank"></a>
            <button id="copyBtn">Copy</button>
        </div>


    </div>

    <script>
        const form = document.getElementById("urlForm");
        const input = document.getElementById("urlInput");
        const result = document.getElementById("result");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            let url = input.value.trim();

            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }

            console.log(url)
            const response = await fetch("/short-url", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    url: url
                })
            });

            const text = await response.text();

            result.innerText = text;
            result.href = text;

            copyBtn.style.display = "inline-block";

            input.value = "";
        });

        const copyBtn = document.getElementById("copyBtn");

        copyBtn.addEventListener("click", async () => {
            const url = result.href;

            if (!url) return;

            await navigator.clipboard.writeText(url);

            copyBtn.innerText = "Copied!";

            setTimeout(() => {
                copyBtn.innerText = "Copy";
            }, 1500);
        });
    </script>

</body>

</html>
